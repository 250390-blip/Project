<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Realtime Chat Firebase</title>
</head>
<body>

<h2>💬 Реактивный чат</h2>

<input id="msg" placeholder="Введите сообщение">
<button onclick="sendMessage()">Отправить</button>

<hr>

<div id="chat"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// 🔑 ТВОЯ КОНФИГУРАЦИЯ
const firebaseConfig = {
  apiKey: "AIzaSyAKibxugN1qyaPGLBKRAoVATh3R5p8f3vY",
  authDomain: "mape-7eaf1.firebaseapp.com",
  projectId: "mape-7eaf1",
  storageBucket: "mape-7eaf1.firebasestorage.app",
  messagingSenderId: "306369715709",
  appId: "1:306369715709:web:ab603b33863c22f3f0cd94",
  measurementId: "G-ESB1P7F11C"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const colRef = collection(db, "messages");


// ======================
// 1 ФУНКЦИЯ: отправка
// ======================
window.sendMessage = async function () {
  const msg = document.getElementById("msg").value;

  if (!msg) return;

  await addDoc(colRef, {
    text: msg,
    time: serverTimestamp()
  });

  document.getElementById("msg").value = "";
};


// ======================
// 2 ФУНКЦИЯ: real-time чат
// ======================
const q = query(colRef, orderBy("time", "desc"));

onSnapshot(q, (snapshot) => {
  let html = "";

  snapshot.forEach(doc => {
    const data = doc.data();
    html += `<p>💬 ${data.text}</p>`;
  });

  document.getElementById("chat").innerHTML = html;
});

</script>

</body>
</html>
