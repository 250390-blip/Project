<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Cloud Chat</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .user-panel { background: white; padding: 10px 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .chat-container { width: 100%; max-width: 450px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chatBox { height: 400px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .sent { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #e9ecef; color: #333; border-bottom-left-radius: 4px; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #eee; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 20px; outline: none; }
        #sendBtn { background: #007bff; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; margin-left: 10px; cursor: pointer; }
        .time { font-size: 10px; opacity: 0.7; display: block; margin-top: 5px; text-align: right; }
    </style>
</head>
<body>

<div class="user-panel">
    <span>Вы зашли как: </span>
    <select id="userSelect">
        <option value="Дүйсенбек Алмас">Дүйсенбек Алмас</option>
        <option value="Алмас">Алмас</option>
    </select>
</div>

<div class="chat-container">
    <div class="header" id="chatHeader">Чат с: Алмас</div>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Ваше сообщение...">
        <button id="sendBtn">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // АКТУАЛЬНЫЙ КОНФИГ ИЗ ТВОЕГО ПРОЕКТА
    const firebaseConfig = {
        apiKey: "AIzaSyAKibxugN1qyaPGLBKRAoVATh3R5p8f3vY",
        authDomain: "mape-7eaf1.firebaseapp.com",
        projectId: "mape-7eaf1",
        storageBucket: "mape-7eaf1.firebasestorage.app",
        messagingSenderId: "306369715709",
        appId: "1:306369715709:web:ab603b33863c22f3f0cd94",
        measurementId: "G-ESB1P7F11C"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ОТПРАВКА СООБЩЕНИЯ
    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('messageInput');
        const currentUser = document.getElementById('userSelect').value;
        const targetUser = (currentUser === "Алмас") ? "Дүйсенбек Алмас" : "Алмас";

        if (!input.value.trim()) return;

        try {
            await addDoc(collection(db, "messages"), {
                from: currentUser,
                to: targetUser,
                text: input.value,
                timestamp: serverTimestamp()
            });
            input.value = "";
        } catch (e) {
            console.error("Ошибка Firebase:", e.message);
            alert("Ошибка отправки! Проверьте Rules в консоли Firebase.");
        }
    };

    // ПОЛУЧЕНИЕ СООБЩЕНИЙ В РЕАЛЬНОМ ВРЕМЕНИ
    const loadMessages = () => {
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        
        onSnapshot(q, (snapshot) => {
            const chatBox = document.getElementById('chatBox');
            const currentUser = document.getElementById('userSelect').value;
            chatBox.innerHTML = "";

            snapshot.forEach((doc) => {
                const m = doc.data();
                
                // Фильтр: показываем только диалог между этой парой
                const isRelevant = (m.from === "Дүйсенбек Алмас" && m.to === "Алмас") || 
                                   (m.from === "Алмас" && m.to === "Дүйсенбек Алмас");

                if (isRelevant) {
                    const isMine = m.from === currentUser;
                    const time = m.timestamp?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) || '...';
                    
                    chatBox.innerHTML += `
                        <div class="msg ${isMine ? 'sent' : 'received'}">
                            ${m.text}
                            <span class="time">${time}</span>
                        </div>
                    `;
                }
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    };

    // Обновление заголовка и чата при смене пользователя
    document.getElementById('userSelect').onchange = () => {
        const user = document.getElementById('userSelect').value;
        document.getElementById('chatHeader').innerText = "Чат с: " + (user === "Алмас" ? "Дүйсенбек Алмас" : "Алмас");
        loadMessages();
    };

    loadMessages();
</script>
</body>
</html>
