<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private DM Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .chat-card { width: 400px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #0084ff; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chatBox { height: 350px; overflow-y: auto; padding: 15px; background: #ffffff; display: flex; flex-direction: column; gap: 8px; }
        .message { padding: 8px 12px; border-radius: 15px; font-size: 14px; max-width: 75%; position: relative; }
        .my-msg { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 2px; }
        .their-msg { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 2px; }
        .input-box { display: flex; border-top: 1px solid #eee; padding: 10px; }
        input { flex: 1; border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; outline: none; }
        button { background: #0084ff; color: white; border: none; padding: 0 15px; margin-left: 5px; border-radius: 20px; cursor: pointer; }
        .time { font-size: 10px; opacity: 0.6; display: block; margin-top: 4px; }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="chat-header">Чат с: Алмас</div>
    <div id="chatBox"></div>
    <div class="input-box">
        <input type="text" id="msgInput" placeholder="Напишите сообщение...">
        <button id="sendBtn">Отправить</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // ТВОЙ ОБНОВЛЕННЫЙ КОНФИГ
    const firebaseConfig = {
        apiKey: "AIzaSyAKibxugN1qyaPGLBKRAoVATh3R5p8f3vY",
        authDomain: "mape-7eaf1.firebaseapp.com",
        projectId: "mape-7eaf1",
        storageBucket: "mape-7eaf1.firebasestorage.app",
        messagingSenderId: "306369715709",
        appId: "1:306369715709:web:ab603b33863c22f3f0cd94",
        measurementId: "G-ESB1P7F11C"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const SENDER = "Дүйсенбек Алмас";
    const RECEIVER = "Алмас";

    // 1. ФУНКЦИЯ ОТПРАВКИ
    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;

        await addDoc(collection(db, "messages"), {
            from: SENDER,
            to: RECEIVER,
            text: input.value,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };

    // 2. ФУНКЦИЯ ПОЛУЧЕНИЯ (REAL-TIME)
    const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
    onSnapshot(q, (snapshot) => {
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = "";
        snapshot.forEach((doc) => {
            const m = doc.data();
            // Фильтруем сообщения только для этой пары пользователей
            if ((m.from === SENDER && m.to === RECEIVER) || (m.from === RECEIVER && m.to === SENDER)) {
                const isMine = m.from === SENDER;
                const time = m.timestamp?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) || '';
                
                chatBox.innerHTML += `
                    <div class="message ${isMine ? 'my-msg' : 'their-msg'}">
                        ${m.text}
                        <span class="time">${time}</span>
                    </div>
                `;
            }
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>
</body>
</html>
