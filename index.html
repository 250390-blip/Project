<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase BaaS - DM System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .user-panel { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .chat-container { width: 100%; max-width: 450px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border: 1px solid #ddd; }
        .header { background: #6f42c1; color: white; padding: 15px; text-align: center; font-weight: 600; }
        #chatBox { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #f8f9fa; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 14px; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: #6f42c1; color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #ffffff; color: #333; border-bottom-left-radius: 2px; border: 1px solid #dee2e6; }
        .controls { font-size: 10px; margin-top: 5px; cursor: pointer; opacity: 0.8; text-decoration: underline; display: flex; gap: 8px; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #eee; background: white; }
        input { flex: 1; border: 1px solid #ced4da; padding: 10px 15px; border-radius: 25px; outline: none; }
        button { background: #6f42c1; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; margin-left: 10px; cursor: pointer; }
        .time { font-size: 10px; opacity: 0.7; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="user-panel">
    <label>Войти как: </label>
    <select id="userSelect">
        <option value="Арман">Арман</option>
        <option value="Мария">Мария</option>
    </select>
</div>

<div class="chat-container">
    <div class="header">Личные сообщения (BaaS)</div>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Введите сообщение...">
        <button id="sendBtn">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
        serverTimestamp, doc, deleteDoc, updateDoc 
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // ТВОЙ КОНФИГ
    const firebaseConfig = {
        apiKey: "AIzaSyAKibxugN1qyaPGLBKRAoVATh3R5p8f3vY",
        authDomain: "mape-7eaf1.firebaseapp.com",
        projectId: "mape-7eaf1",
        storageBucket: "mape-7eaf1.firebasestorage.app",
        messagingSenderId: "306369715709",
        appId: "1:306369715709:web:ab603b33863c22f3f0cd94"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ФУНКЦИЯ 1: Удаление сообщения (Удаление данных)
    window.deleteMessage = async (id) => {
        if (confirm("Вы уверены, что хотите удалить сообщение?")) {
            try {
                await deleteDoc(doc(db, "messages", id));
            } catch (e) { console.error("Ошибка удаления:", e); }
        }
    };

    // ФУНКЦИЯ 2: Редактирование сообщения (Обновление данных)
    window.editMessage = async (id, oldText) => {
        const newText = prompt("Отредактируйте сообщение:", oldText);
        if (newText && newText !== oldText) {
            try {
                await updateDoc(doc(db, "messages", id), {
                    text: newText,
                    edited: true
                });
            } catch (e) { console.error("Ошибка редактирования:", e); }
        }
    };

    // Отправка сообщения
    document.getElementById('sendBtn').onclick = async () => {
        const input = document.getElementById('msgInput');
        const from = document.getElementById('userSelect').value;
        const to = (from === "Арман") ? "Мария" : "Арман";

        if (input.value.trim()) {
            await addDoc(collection(db, "messages"), {
                from: from,
                to: to,
                text: input.value,
                timestamp: serverTimestamp()
            });
            input.value = "";
        }
    };

    // Слушатель в реальном времени
    const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
    onSnapshot(q, (snapshot) => {
        const chatBox = document.getElementById('chatBox');
        const me = document.getElementById('userSelect').value;
        chatBox.innerHTML = "";

        snapshot.forEach((doc) => {
            const data = doc.data();
            const isMine = data.from === me;
            const time = data.timestamp?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) || '...';
            
            chatBox.innerHTML += `
                <div class="msg ${isMine ? 'sent' : 'received'}">
                    <div>${data.text} ${data.edited ? '<small>(ред.)</small>' : ''}</div>
                    <span class="time">${time}</span>
                    ${isMine ? `
                        <div class="controls">
                            <span onclick="editMessage('${doc.id}', '${data.text}')">Изменить</span>
                            <span onclick="deleteMessage('${doc.id}')">Удалить</span>
                        </div>
                    ` : ''}
                </div>
            `;
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>
</body>
</html>
