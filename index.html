<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Task Manager</title>
</head>
<body>

<h2>📋 Список задач</h2>

<input id="task" placeholder="Новая задача">
<button onclick="addTask()">Добавить</button>

<hr>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// 🔑 ТВОЙ CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAKibxugN1qyaPGLBKRAoVATh3R5p8f3vY",
  authDomain: "mape-7eaf1.firebaseapp.com",
  projectId: "mape-7eaf1",
  storageBucket: "mape-7eaf1.firebasestorage.app",
  messagingSenderId: "306369715709",
  appId: "1:306369715709:web:ab603b33863c22f3f0cd94",
  measurementId: "G-ESB1P7F11C"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const colRef = collection(db, "tasks");


// ================== 1 ФУНКЦИЯ: ДОБАВЛЕНИЕ ==================
window.addTask = async function () {
  const text = document.getElementById("task").value;

  if (!text) return;

  await addDoc(colRef, {
    text: text,
    done: false
  });

  document.getElementById("task").value = "";
};


// ================== REAL-TIME ОТОБРАЖЕНИЕ ==================
const q = query(colRef, orderBy("text"));

onSnapshot(q, (snapshot) => {
  let html = "";

  snapshot.forEach(docItem => {
    const data = docItem.data();

    html += `
      <p>
        ${data.done ? "✅" : "⬜"} ${data.text}
        <button onclick="toggleTask('${docItem.id}', ${data.done})">
          Изменить
        </button>
      </p>
    `;
  });

  document.getElementById("list").innerHTML = html;
});


// ================== 2 ФУНКЦИЯ: ИЗМЕНЕНИЕ СТАТУСА ==================
window.toggleTask = async function (id, current) {
  const ref = doc(db, "tasks", id);

  await updateDoc(ref, {
    done: !current
  });
};

</script>

</body>
</html>
