<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Realtime Firebase App</title>
</head>
<body>

<h2>🔥 Реактивные посты</h2>

<input type="text" id="text" placeholder="Введите пост">
<button id="addBtn">Добавить</button>

<hr>

<div id="posts"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  doc,
  updateDoc,
  increment,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// 🔑 КОНФИГУРАЦИЯ (вставь свою из Firebase)
const firebaseConfig = {
 apiKey: "AIzaSyAKibxugN1qyaPGLBKRAoVATh3R5p8f3vY",
  authDomain: "mape-7eaf1.firebaseapp.com",
  projectId: "mape-7eaf1",
  appId: "1:306369715709:web:ab603b33863c22f3f0cd94",
};

// 🔗 Инициализация
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================== ДОБАВЛЕНИЕ ПОСТА ==================
document.getElementById("addBtn").addEventListener("click", async () => {
  const text = document.getElementById("text").value;

  if (!text) return;

  await addDoc(collection(db, "posts"), {
    text: text,
    likes: 0,
    timestamp: serverTimestamp()
  });

  document.getElementById("text").value = "";
});


// ================== REAL-TIME СИНХРОНИЗАЦИЯ ==================
const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  snapshot.forEach((docItem) => {
    const data = docItem.data();

    const div = document.createElement("div");

    div.innerHTML = `
      <p>${data.text}</p>
      <button onclick="likePost('${docItem.id}')">
        ❤️ ${data.likes || 0}
      </button>
      <hr>
    `;

    container.appendChild(div);
  });
});


// ================== АТОМАРНЫЙ ЛАЙК ==================
window.likePost = async function (id) {
  const ref = doc(db, "posts", id);

  await updateDoc(ref, {
    likes: increment(1)
  });
};

</script>

</body>
</html>
