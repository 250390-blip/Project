<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Tasks Firebase FIX</title>
</head>
<body>

<h2>📋 Задачи</h2>

<input id="task" placeholder="Новая задача">
<button onclick="addTask()">Добавить</button>

<hr>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// 🔑 ТВОЙ CONFIG (оставляем как есть)
const firebaseConfig = {
  apiKey: "AIzaSyAKibxugN1qyaPGLBKRAoVATh3R5p8f3vY",
  authDomain: "mape-7eaf1.firebaseapp.com",
  projectId: "mape-7eaf1",
  storageBucket: "mape-7eaf1.firebasestorage.app",
  messagingSenderId: "306369715709",
  appId: "1:306369715709:web:ab603b33863c22f3f0cd94"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const colRef = collection(db, "tasks");


// =================== 1 ФУНКЦИЯ ===================
window.addTask = async function () {
  const text = document.getElementById("task").value;

  if (!text) return;

  try {
    await addDoc(colRef, {
      text: text,
      done: false
    });

    document.getElementById("task").value = "";

  } catch (e) {
    console.log("Ошибка добавления:", e);
  }
};


// =================== REALTIME ===================
onSnapshot(colRef, (snapshot) => {
  let html = "";

  snapshot.forEach(docItem => {
    const data = docItem.data();

    html += `
      <p>
        ${data.done ? "✅" : "⬜"} ${data.text}
        <button onclick="toggle('${docItem.id}', ${data.done})">
          изменить
        </button>
      </p>
    `;
  });

  document.getElementById("list").innerHTML = html;
});


// =================== 2 ФУНКЦИЯ ===================
window.toggle = async function (id, current) {
  const ref = doc(db, "tasks", id);

  await updateDoc(ref, {
    done: !current
  });
};

</script>

</body>
</html>
