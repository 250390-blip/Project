<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Realtime Posts</title>
</head>
<body>

<h2>Посты</h2>

<input type="text" id="text" placeholder="Текст поста">
<button onclick="addPost()">Добавить</button>

<div id="posts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  updateDoc,
  doc,
  increment,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAKibxugN1qyaPGLBKRAoVATh3R5p8f3vY",
  authDomain: "mape-7eaf1.firebaseapp.com",
  projectId: "mape-7eaf1",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ➕ Добавление поста
window.addPost = async function () {
  const text = document.getElementById("text").value;

  await addDoc(collection(db, "posts"), {
    text: text,
    likes: 0,
    timestamp: serverTimestamp()
  });
};

// 🔴 REAL-TIME СЛУШАТЕЛЬ
const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  snapshot.forEach((docItem) => {
    const data = docItem.data();

    const div = document.createElement("div");
    div.innerHTML = `
      <p>${data.text}</p>
      <button onclick="likePost('${docItem.id}')">
        ❤️ ${data.likes}
      </button>
      <hr>
    `;

    container.appendChild(div);
  });
});

// ❤️ ЛАЙК (атомарно)
window.likePost = async function (id) {
  const ref = doc(db, "posts", id);

  await updateDoc(ref, {
    likes: increment(1)
  });
};

</script>

</body>
</html>
